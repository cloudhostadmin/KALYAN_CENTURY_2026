<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>कल्याण शताब्दी वर्ष</title>

    <!-- Warm up connections the moment the browser parses <head> -->
    <link rel="preconnect" href="https://script.google.com">
    <link rel="dns-prefetch" href="https://script.google.com">
    <link rel="preconnect" href="https://api.postalpincode.in">
    <link rel="dns-prefetch" href="https://api.postalpincode.in">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fff9e6 0%, #fffbf0 50%, #fff9e6 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(218,165,32,.15);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            border: 2px solid #f5e6c3;
        }

        .header-section {
            margin-bottom: 30px;
            border-bottom: 3px solid #d4a017;
            padding-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 30px;
        }
        .header-text { flex: 1; text-align: left; }
        .header-image {
            width: var(--logo-size, 180px);
            height: var(--logo-size, 180px);
            object-fit: contain;
            flex-shrink: 0;
        }
        h1 {
            color: #c17817;
            font-size: 28px;
            margin: 0 0 10px 0;
            font-weight: 700;
            text-shadow: 1px 1px 2px rgba(193,120,23,.1);
        }
        .sub-heading {
            color: #8b6914; font-size: 16px; font-weight: 600;
            margin-top: 5px; text-transform: uppercase; letter-spacing: 1px;
        }
        .sub-heading-note {
            color: #666; font-size: 13px; font-weight: 500;
            margin-top: 8px; font-style: italic;
        }

        .edit-notice {
            color: #e74c3c; font-size: 14px; font-weight: 600; margin-bottom: 20px;
        }
        .edit-notice::before { content: "★ "; }

        .form-group { margin-bottom: 20px; }
        .form-row {
            display: grid; grid-template-columns: 1fr 2fr 2fr;
            gap: 15px; margin-bottom: 20px;
        }
        .form-row .form-group { margin-bottom: 0; }

        label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; font-size: 14px; }

        input, textarea {
            width: 100%; padding: 12px;
            border: 2px solid #e0e0e0; border-radius: 8px;
            font-size: 14px;
            transition: border-color .25s, box-shadow .25s, background .4s;
        }
        input:disabled { background-color: #f5f5f5; cursor: not-allowed; color: #666; }
        input:not(:disabled):focus, textarea:focus {
            outline: none; border-color: #d4a017;
            box-shadow: 0 0 0 3px rgba(212,160,23,.1);
        }
        textarea { resize: vertical; min-height: 80px; font-family: inherit; }

        .char-count { text-align: right; font-size: 12px; color: #999; margin-top: 5px; }
        .required { color: #e74c3c; }

        /* ─── Skeleton shimmer while data is loading ─── */
        @keyframes shimmer {
            0%   { background-position: -600px 0; }
            100% { background-position:  600px 0; }
        }
        .skeleton input:not(:disabled),
        .skeleton textarea {
            color: transparent !important;
            pointer-events: none;
            background: linear-gradient(90deg, #f0e8d0 25%, #fdf6e3 50%, #f0e8d0 75%);
            background-size: 600px 100%;
            animation: shimmer 1.2s infinite linear;
            border-color: #eddcb0;
            caret-color: transparent;
        }
        /* Disabled inputs (customerId, mobile) stay normal */
        .skeleton input:disabled {
            animation: none;
            background: #f5f5f5;
        }

        /* ─── Tiny status line, no full-page overlay ─── */
        #fetchStatus {
            font-size: 12px; color: #a07820; text-align: right;
            margin-bottom: 6px; min-height: 16px;
        }

        .pincode-status { font-size: 12px; margin-top: 5px; padding: 5px; border-radius: 4px; }
        .pincode-status.loading { color: #c17817; background: #fffbf0; border: 1px solid #f5e6c3; }
        .pincode-status.success { color: #28a745; background: #d4edda; }
        .pincode-status.error   { color: #dc3545; background: #f8d7da; }

        .submit-btn {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, #d4a017 0%, #c17817 100%);
            color: white; border: none; border-radius: 8px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: all .3s ease; margin-top: 10px;
        }
        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(212,160,23,.4);
            background: linear-gradient(135deg, #e5b01f 0%, #d08820 100%);
        }
        .submit-btn:active:not(:disabled) { transform: translateY(0); }
        .submit-btn:disabled { opacity: .6; cursor: not-allowed; }

        .already-submitted { text-align: center; padding: 40px 20px; display: none; }
        .already-submitted h2 { color: #c17817; margin-bottom: 15px; }
        .already-submitted p  { color: #666; font-size: 16px; }

        #fetchError {
            display: none;
            background: #fff3cd; border: 2px solid #ffc107;
            color: #856404; padding: 14px 18px; border-radius: 8px;
            margin-bottom: 20px; font-size: 14px; font-weight: 600;
        }
        #fetchError.active { display: block; }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .container { padding: 25px; }
            .header-section { flex-direction: column; align-items: center; text-align: center; }
            .header-text { text-align: center; }
            .header-image {
                width: calc(var(--logo-size, 180px) * .7);
                height: calc(var(--logo-size, 180px) * .7);
            }
            h1 { font-size: 22px; }
            .sub-heading { font-size: 14px; }
            .sub-heading-note { font-size: 12px; }
            .form-row { grid-template-columns: 1fr; gap: 0; }
            .form-row .form-group { margin-bottom: 20px; }
        }
    </style>
</head>
<body>
<div class="container">

    <div class="header-section">
        <div class="header-text">
            <h1>कल्याण शताब्दी वर्ष</h1>
            <div class="sub-heading">Kalyan 2026 Renewal Form</div>
            <div class="sub-heading-note">Only for Renewal of Existing Subscriptions</div>
        </div>
        <img src="https://raw.githubusercontent.com/cloudhostadmin/KALYAN_CENTURY_2026/main/kal2026.jpeg"
             alt="Kalyan Logo" class="header-image" id="rightLogo" loading="eager">
    </div>

    <div class="already-submitted" id="alreadySubmitted">
        <h2>✅ Already Submitted</h2>
        <p>This form has already been submitted and cannot be submitted again.</p>
        <p style="margin-top:10px;color:#999;">Thank you for your submission!</p>
    </div>

    <div id="fetchError"></div>
    <div id="fetchStatus"></div>

    <form id="kalyanForm">
        <div class="edit-notice">Please Edit the Fields if data is incorrect</div>

        <div class="form-group">
            <label for="customerId">Customer ID</label>
            <input type="text" id="customerId" name="customerId" disabled>
        </div>

        <input type="hidden" id="paymentLink" name="paymentLink" value="https://p.ppsl.io/PYTMPS/f4FEqk">

        <div class="form-group">
            <label for="firstName">First Name <span class="required">*</span></label>
            <input type="text" id="firstName" name="firstName" required>
        </div>

        <div class="form-group">
            <label for="lastName">Last Name <span class="required">*</span></label>
            <input type="text" id="lastName" name="lastName" required>
        </div>

        <div class="form-group">
            <label for="address1">Address 1 <span class="required">*</span></label>
            <input type="text" id="address1" name="address1" required maxlength="40">
            <div class="char-count"><span id="address1Count">0</span>/40</div>
        </div>

        <div class="form-group">
            <label for="address2">Address 2 <span class="required">*</span></label>
            <input type="text" id="address2" name="address2" required maxlength="40">
            <div class="char-count"><span id="address2Count">0</span>/40</div>
        </div>

        <div class="form-group">
            <label for="address3">Address 3</label>
            <input type="text" id="address3" name="address3" maxlength="40">
            <div class="char-count"><span id="address3Count">0</span>/40</div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="pincode">Pincode <span class="required">*</span></label>
                <input type="text" id="pincode" name="pincode" required pattern="[0-9]{6}" maxlength="6" placeholder="6-digit">
                <div id="pincodeStatus" class="pincode-status" style="display:none;"></div>
            </div>
            <div class="form-group">
                <label for="city">City <span class="required">*</span></label>
                <input type="text" id="city" name="city" required placeholder="Auto-filled">
            </div>
            <div class="form-group">
                <label for="state">State <span class="required">*</span></label>
                <input type="text" id="state" name="state" required placeholder="Auto-filled">
            </div>
        </div>

        <div class="form-group">
            <label for="mobileNumber">Mobile Number <span class="required">*</span></label>
            <input type="tel" id="mobileNumber" name="mobileNumber" disabled required
                   pattern="[0-9]{10}" maxlength="10" placeholder="Mobile number">
        </div>

        <div class="form-group">
            <label for="emailId">Email ID</label>
            <input type="email" id="emailId" name="emailId"
                   placeholder="Please provide for Easier communications">
        </div>

        <div class="form-group">
            <label for="alternateMobile">Alternate Mobile / WhatsApp Number</label>
            <input type="tel" id="alternateMobile" name="alternateMobile"
                   placeholder="Enter alternate mobile number" pattern="[0-9]{10}" maxlength="10">
        </div>

        <div class="form-group hidden">
            <label for="remarks">Remarks (Maximum 200 characters)</label>
            <textarea id="remarks" name="remarks" maxlength="200"
                      placeholder="Enter your remarks here..."></textarea>
            <div class="char-count"><span id="charCount">0</span>/200</div>
        </div>

        <button type="submit" id="submitBtn" class="submit-btn">Submit &amp; Proceed to Payment</button>
    </form>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  CONFIG  ← paste your Apps Script GET deployment URL here
// ═══════════════════════════════════════════════════════════
const APPS_SCRIPT_URL   = 'https://script.google.com/macros/s/AKfycbxsFNHtUwokxokUMOAYXblgSvyKxwJQwxNdUopLQMt-4JxbMJHFr4vATSGxI7mHU56I/exec';
const SUBMIT_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx_H0xt1k2ZrSLZ32hCIhbfWPu27kcGKhO5jFkt6gkHD4rfSS3YzkM0lW9JnuS2WvN5/exec';

// ── Refs ─────────────────────────────────────────────────
const form              = document.getElementById('kalyanForm');
const submitBtn         = document.getElementById('submitBtn');
const alreadySubmittedDiv = document.getElementById('alreadySubmitted');
const pincodeInput      = document.getElementById('pincode');
const cityInput         = document.getElementById('city');
const stateInput        = document.getElementById('state');
const pincodeStatus     = document.getElementById('pincodeStatus');
const address1Input     = document.getElementById('address1');
const address2Input     = document.getElementById('address2');
const address3Input     = document.getElementById('address3');
const a1Span = document.getElementById('address1Count');
const a2Span = document.getElementById('address2Count');
const a3Span = document.getElementById('address3Count');
const fetchError        = document.getElementById('fetchError');
const fetchStatus       = document.getElementById('fetchStatus');
const remarksField      = document.getElementById('remarks');
const charCount         = document.getElementById('charCount');

// ── Char counts ──────────────────────────────────────────
const upd = (el, span) => { span.textContent = el.value.length; };
address1Input.addEventListener('input', () => upd(address1Input, a1Span));
address2Input.addEventListener('input', () => upd(address2Input, a2Span));
address3Input.addEventListener('input', () => upd(address3Input, a3Span));
remarksField.addEventListener('input',  () => { charCount.textContent = remarksField.value.length; });

// ── URL param helper ─────────────────────────────────────
function getParam(name) {
    const v = new URLSearchParams(window.location.search).get(name);
    if (v) return v;
    if (window.location.hash) {
        const hv = new URLSearchParams(window.location.hash.slice(1)).get(name);
        if (hv) return hv;
    }
    return '';
}

// ── Set field ────────────────────────────────────────────
function setField(id, value) {
    if (value == null || value === '') return;
    const el = document.getElementById(id);
    if (el) el.value = String(value).trim();
}

// ── Skeleton shimmer toggle ──────────────────────────────
function setShimmer(on) {
    form.classList.toggle('skeleton', on);
    submitBtn.disabled = on;
    fetchStatus.textContent = on ? '⏳ Loading your details…' : '';
}

// ── Pincode → city/state ─────────────────────────────────
async function fetchPincode(pincode, silent = false) {
    if (!/^\d{6}$/.test(pincode)) return null;
    try {
        if (!silent) {
            pincodeStatus.textContent = '🔍 Fetching location…';
            pincodeStatus.className = 'pincode-status loading';
            pincodeStatus.style.display = 'block';
        }
        const r = await fetch(`https://api.postalpincode.in/pincode/${pincode}`);
        const d = await r.json();
        if (d?.[0]?.Status === 'Success' && d[0].PostOffice?.length > 0) {
            const po = d[0].PostOffice[0];
            if (!silent) {
                pincodeStatus.textContent = '✅ Location found!';
                pincodeStatus.className = 'pincode-status success';
                setTimeout(() => pincodeStatus.style.display = 'none', 3000);
            }
            return { city: po.District || po.Block || '', state: po.State || '' };
        }
        if (!silent) {
            pincodeStatus.textContent = '❌ Invalid pincode — enter city & state manually';
            pincodeStatus.className = 'pincode-status error';
            setTimeout(() => pincodeStatus.style.display = 'none', 4000);
        }
        return null;
    } catch {
        if (!silent) {
            pincodeStatus.textContent = '⚠️ Error — enter city & state manually';
            pincodeStatus.className = 'pincode-status error';
            setTimeout(() => pincodeStatus.style.display = 'none', 4000);
        }
        return null;
    }
}

pincodeInput.addEventListener('input', async e => {
    const p = e.target.value.trim();
    if (p.length < 6) { pincodeStatus.style.display = 'none'; return; }
    if (p.length === 6) {
        const loc = await fetchPincode(p);
        if (loc) { cityInput.value = loc.city; stateInput.value = loc.state; }
    }
});

// ── Populate form from sheet row ─────────────────────────
async function populateFromData(data) {
    setField('firstName',       data.firstName);
    setField('lastName',        data.lastName);
    setField('address1',        data.address1);
    setField('address2',        data.address2);
    setField('address3',        data.address3);
    setField('mobileNumber',    data.mobileNumber || data.mobile);
    setField('emailId',         data.email || data.emailId);
    setField('alternateMobile', data.alternateMobile);
    // paymentLink from sheet overrides URL param
    if (data.paymentLink || data.PaymentLink)
        setField('paymentLink', data.paymentLink || data.PaymentLink);

    const pincode = data.pincode ? String(data.pincode).trim() : '';
    if (pincode) {
        setField('pincode', pincode);
        if (data.city && data.state) {
            setField('city', data.city);
            setField('state', data.state);
        } else {
            const loc = await fetchPincode(pincode, true);
            if (loc) { cityInput.value = loc.city; stateInput.value = loc.state; }
        }
    } else {
        setField('city',  data.city);
        setField('state', data.state);
    }

    upd(address1Input, a1Span);
    upd(address2Input, a2Span);
    upd(address3Input, a3Span);
}

// ════════════════════════════════════════════════════════
//  INIT — form renders instantly; data fills in as it arrives
// ════════════════════════════════════════════════════════
async function initForm() {
    // Apply URL params that are known immediately
    const customerId   = getParam('customerId');
    const paymentLink  = getParam('paymentLink');
    const rightLogoUrl = getParam('rightLogo');
    const logoSize     = getParam('logoSize');

    if (paymentLink)  setField('paymentLink', decodeURIComponent(paymentLink));
    if (rightLogoUrl) document.getElementById('rightLogo').src = decodeURIComponent(rightLogoUrl);
    if (logoSize) {
        const s = parseInt(decodeURIComponent(logoSize));
        if (s > 0 && s <= 300)
            document.documentElement.style.setProperty('--logo-size', `${s}px`);
    }

    if (!customerId) return;  // no ID → show blank editable form

    const id = decodeURIComponent(customerId);
    setField('customerId', id);

    // Already submitted? Show message instantly without any fetch
    const key = `form_submitted_${id}`;
    if (localStorage.getItem(key) === 'true') {
        form.style.display = 'none';
        alreadySubmittedDiv.style.display = 'block';
        return;
    }

    // Show shimmer — form is visible right away, just fields are animated
    setShimmer(true);

    try {
        const res    = await fetch(`${APPS_SCRIPT_URL}?action=getCustomer&customerId=${encodeURIComponent(id)}`);
        const result = await res.json();

        if (result.success && result.data) {
            await populateFromData(result.data);
        } else {
            fetchError.textContent = `⚠️ Customer ID "${id}" not found. Please fill in your details manually.`;
            fetchError.classList.add('active');
        }
    } catch (err) {
        console.error('Fetch error:', err);
        fetchError.textContent = '⚠️ Could not load your details. Please fill in manually.';
        fetchError.classList.add('active');
    } finally {
        setShimmer(false);
    }
}

// ── Submit ────────────────────────────────────────────────
form.addEventListener('submit', async e => {
    e.preventDefault();

    const custId = document.getElementById('customerId').value;
    const key    = `form_submitted_${custId}`;

    if (localStorage.getItem(key) === 'true') {
        alert('This form has already been submitted!');
        return;
    }

    submitBtn.disabled    = true;
    submitBtn.textContent = 'Processing…';

    const fd = {
        customerId:      custId,
        paymentLink:     document.getElementById('paymentLink').value,
        firstName:       document.getElementById('firstName').value,
        lastName:        document.getElementById('lastName').value,
        address1:        document.getElementById('address1').value,
        address2:        document.getElementById('address2').value,
        address3:        document.getElementById('address3').value,
        pincode:         document.getElementById('pincode').value,
        city:            document.getElementById('city').value,
        state:           document.getElementById('state').value,
        mobileNumber:    document.getElementById('mobileNumber').value,
        emailId:         document.getElementById('emailId').value,
        alternateMobile: document.getElementById('alternateMobile').value,
        remarks:         document.getElementById('remarks').value,
        timestamp:       new Date().toISOString()
    };

    try {
        await fetch(SUBMIT_SCRIPT_URL, {
            method: 'POST', mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(fd)
        });
        localStorage.setItem(key, 'true');
        window.location.href = fd.paymentLink;
    } catch {
        alert('An error occurred. Please try again.');
        submitBtn.disabled    = false;
        submitBtn.textContent = 'Submit & Proceed to Payment';
    }
});

initForm();
</script>
</body>
</html>
